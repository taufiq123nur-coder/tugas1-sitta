<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITTA - Histori Transaksi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Kontainer untuk filter dan pencarian */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .filter-options {
            display: flex;
            gap: 15px;
        }

        .filter-options select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        /* Desain Tabel Histori */
        .table-container {
            overflow-x: auto;
            background: var(--white);
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-light);
            color: var(--white);
            font-weight: 500;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* Badge untuk Jenis Transaksi */
        .type-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-kirim { background: rgba(15, 52, 96, 0.1); color: var(--primary-color); }
        .type-masuk { background: rgba(40, 167, 69, 0.1); color: var(--success); }
        .type-koreksi { background: rgba(249, 168, 38, 0.1); color: #d97706; }

        /* Badge untuk Status */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .status-pill::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-selesai { color: var(--success); }
        .status-selesai::before { background: var(--success); }
        
        .status-proses { color: var(--secondary-color); }
        .status-proses::before { background: var(--secondary-color); }
        
        .status-gagal { color: var(--danger); }
        .status-gagal::before { background: var(--danger); }

        .qty-box {
            font-weight: 600;
            color: var(--primary-color);
        }

        .qty-negative {
            color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img src="img/logo-ut.png" alt="Logo UT" style="width: 35px;">
                    SITTA
                </h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="stok.html"><i class="fas fa-boxes"></i> Informasi Bahan Ajar</a></li>
                <li><a href="tracking.html"><i class="fas fa-truck"></i> Tracking Pengiriman</a></li>
                <li><a href="histori.html" class="active"><i class="fas fa-history"></i> Histori Transaksi</a></li>
                <li><a href="#" onclick="logout()" style="color: #ff6b6b; margin-top: 50px;"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Bar Atas (Header/Topbar) -->
            <div class="topbar">
                <div class="greeting">
                    <h3 id="greetingText">Histori Transaksi</h3>
                    <p style="font-size: 14px; color: var(--text-light);" id="currentDate"></p>
                </div>
                <div class="user-info">
                    <div style="text-align: right;">
                        <strong id="userNameDisplay">User</strong>
                        <div style="font-size: 12px; color: var(--text-light);" id="userRoleDisplay">Administrator</div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User Profile" style="width: 40px; height: 40px; border-radius: 50%;" id="userAvatar">
                </div>
            </div>

            <div class="action-bar">
                <h2 style="color: var(--primary-color); margin-bottom: 20px;">Daftar Transaksi Terakhir</h2>
            </div>

            <!-- Filter & Search -->
            <div class="filter-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari No. DO, Item, atau Penerima..." onkeyup="filterData()">
                </div>
                <div class="filter-options">
                    <select id="typeFilter" onchange="filterData()">
                        <option value="">Semua Jenis</option>
                        <option value="Kirim">Kirim</option>
                        <option value="Masuk">Masuk</option>
                        <option value="Koreksi">Koreksi</option>
                    </select>
                    <select id="statusFilter" onchange="filterData()">
                        <option value="">Semua Status</option>
                        <option value="Selesai">Selesai</option>
                        <option value="Diproses">Diproses</option>
                        <option value="Gagal">Gagal</option>
                    </select>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No. Transaksi</th>
                            <th>Tanggal & Waktu</th>
                            <th>Jenis</th>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Penerima</th>
                            <th>Status</th>
                            <th>Admin</th>
                        </tr>
                    </thead>
                    <tbody id="historiTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script>
        // Cek Login
        const loggedInUser = JSON.parse(localStorage.getItem('userLoggedIn'));
        if(!loggedInUser) {
            window.location.href = 'login.html';
        } else {
            // Update Topbar Info
            document.getElementById('userNameDisplay').textContent = loggedInUser.nama;
            document.getElementById('userRoleDisplay').textContent = loggedInUser.role + " - " + loggedInUser.lokasi;
            document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(loggedInUser.nama)}&background=16213E&color=fff`;
            
            // Set Tanggal
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', options);
        }

        // Render Table
        function renderHistori(data) {
            const tbody = document.getElementById('historiTableBody');
            tbody.innerHTML = '';

            data.forEach(item => {
                const tr = document.createElement('tr');
                
                // Class untuk Jenis
                const typeClass = `type-badge type-${item.jenis.toLowerCase()}`;
                
                // Class untuk Status
                let statusClass = 'status-pill';
                if(item.status === 'Selesai') statusClass += ' status-selesai';
                else if(item.status === 'Diproses') statusClass += ' status-proses';
                else statusClass += ' status-gagal';

                // Class untuk Qty (Merah jika negatif)
                const qtyClass = item.qty < 0 ? 'qty-box qty-negative' : 'qty-box';

                tr.innerHTML = `
                    <td><strong style="color: var(--primary-color)">${item.id}</strong></td>
                    <td style="font-size: 13px; color: var(--text-light)">${item.tanggal}</td>
                    <td><span class="${typeClass}">${item.jenis}</span></td>
                    <td>${item.item}</td>
                    <td><span class="${qtyClass}">${item.qty}</span></td>
                    <td>${item.penerima}</td>
                    <td><span class="${statusClass}">${item.status}</span></td>
                    <td style="font-size: 13px;">${item.admin}</td>
                `;
                tbody.appendChild(tr);
            });

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 30px; color: #999;">Data tidak ditemukan</td></tr>';
            }
        }

        // Filter Logic
        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeValue = document.getElementById('typeFilter').value;
            const statusValue = document.getElementById('statusFilter').value;

            const filtered = dataHistori.filter(item => {
                const matchesSearch = item.id.toLowerCase().includes(searchTerm) || 
                                     item.item.toLowerCase().includes(searchTerm) || 
                                     item.penerima.toLowerCase().includes(searchTerm);
                const matchesType = typeValue === "" || item.jenis === typeValue;
                const matchesStatus = statusValue === "" || item.status === statusValue;

                return matchesSearch && matchesType && matchesStatus;
            });

            renderHistori(filtered);
        }

        // Initial Load
        renderHistori(dataHistori);

        // Logout
        function logout() {
            localStorage.removeItem('userLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
